<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Calculadora</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <h1 class="titulo">MiniCalculadora</h1>

    <div class="calculadora">
        <input type="number" id="num1" placeholder="Primer número">
        <input type="number" id="num2" placeholder="Segundo número">

        <div class="botones">
            <button onclick="operar('sumar')">Sumar</button>
            <button onclick="operar('restar')">Restar</button>
            <button onclick="operar('multiplicar')">Multiplicar</button>
            <button onclick="operar('dividir')">Dividir</button>
        </div>

        <h2>Resultado: <span id="resultado"></span></h2>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
